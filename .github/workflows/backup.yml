name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Create backup
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BACKUP_SECRET: ${{ secrets.BACKUP_SECRET }}
        run: |
          FILENAME="backup_$(date +%Y%m%d_%H%M%S).json"
          HTTP_STATUS=$(curl -s -o "$FILENAME" -w "%{http_code}" -H "x-backup-secret: $BACKUP_SECRET" "$APP_URL/api/admin/backup")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Response body: $(cat $FILENAME)"
            exit 1
          fi
          echo "Users backed up: $(python3 -c "import json; print(len(json.load(open('$FILENAME'))))")"
          echo "Size: $(du -sh $FILENAME | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.json
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: echo "::error::Database backup failed!"
