name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/backup.py > backup_$(date +%Y%m%d_%H%M%S).json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.json
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: echo "::error::Database backup failed! Check DATABASE_URL secret."
