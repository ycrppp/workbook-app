name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'   # каждую ночь в 3:00 UTC
  workflow_dispatch:        # ручной запуск из GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Create dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          FILENAME="backup_$(date +%Y%m%d_%H%M%S).dump"
          /usr/lib/postgresql/18/bin/pg_dump "$DATABASE_URL" --no-owner --no-acl -Fc -f "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Size: $(du -sh $FILENAME | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: '*.dump'
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: echo "::error::Database backup failed! Check DATABASE_URL secret and DB connectivity."
